<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" style="background-color: #1a1a1a;">
  <defs>
    <radialGradient id="skin-glow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#e58e26" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1a1a1a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <!-- Skin Layers Block -->
  <path d="M150,140 L250,140 L250,220 L150,220 Z" stroke="#e58e26" stroke-width="2" fill="none" opacity="0.5"/>
  <line x1="150" y1="160" x2="250" y2="160" stroke="#e58e26" stroke-width="1" opacity="0.3"/>
  
  <!-- Hair Follicle -->
  <path d="M180,200 Q180,160 170,120" stroke="#e58e26" stroke-width="2" fill="none" opacity="0.8"/>
  <path d="M220,200 Q220,160 230,120" stroke="#e58e26" stroke-width="2" fill="none" opacity="0.8"/>
  
  <!-- Pore/Surface -->
  <circle cx="170" cy="120" r="1.5" fill="#e58e26"/>
  <circle cx="230" cy="120" r="1.5" fill="#e58e26"/>

  <!-- Glow -->
  <circle cx="200" cy="170" r="80" fill="url(#skin-glow)" opacity="0.25"/>
</svg>
